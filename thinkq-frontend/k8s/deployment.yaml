apiVersion: apps/v1
kind: Deployment
metadata:
  name: thinkq-frontend
  namespace: thinkq
spec:
  replicas: 1
  selector:
    matchLabels:
      app: thinkq-frontend
  template:
    metadata:
      labels:
        app: thinkq-frontend
    spec:
      containers:
        - name: thinkq-frontend
          image: thinkq-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
      volumes:
        - name: nginx-config
          configMap:
            name: thinkq-frontend-nginx
