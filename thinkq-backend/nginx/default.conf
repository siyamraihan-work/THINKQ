server {
    listen 80;
    server_name _;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    location /auth {
        proxy_pass http://auth-user-service:3001;
    }

    location /users {
        proxy_pass http://auth-user-service:3001;
    }

    location /admin {
        proxy_pass http://admin-service:3002;
    }

    location /tickets {
        proxy_pass http://tickets-service:3003;
    }

    location /analytics {
        proxy_pass http://analytics-service:3005;
    }

    location /student/live {
        proxy_pass http://notifications-service:3004;
    }

    location /queue {
        proxy_pass http://notifications-service:3004;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        chunked_transfer_encoding off;
        proxy_buffering off;
        proxy_cache off;
    }

    location /events {
        proxy_pass http://notifications-service:3004;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        chunked_transfer_encoding off;
        proxy_buffering off;
        proxy_cache off;
    }

    location /health {
        return 200 'ok';
        add_header Content-Type text/plain;
    }
}
