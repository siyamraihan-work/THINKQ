apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: helpdesk
spec:
  replicas: 1
  selector:
    matchLabels: { app: postgres }
  template:
    metadata:
      labels: { app: postgres }
    spec:
      containers:
        - name: postgres
          image: postgres:16
          env:
            - name: POSTGRES_DB
              value: helpdesk
            - name: POSTGRES_USER
              value: helpdesk
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: helpdesk-secrets
                  key: POSTGRES_PASSWORD
          ports:
            - containerPort: 5432
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: helpdesk
spec:
  replicas: 1
  selector:
    matchLabels: { app: redis }
  template:
    metadata:
      labels: { app: redis }
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          command: ["sh", "-c", "redis-server --requirepass $REDIS_PASSWORD"]
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: helpdesk-secrets
                  key: REDIS_PASSWORD
          ports:
            - containerPort: 6379
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: data-service
  namespace: helpdesk
spec:
  replicas: 1
  selector:
    matchLabels: { app: data-service }
  template:
    metadata:
      labels: { app: data-service }
    spec:
      containers:
        - name: data-service
          image: your-registry/data-service:latest
          env:
            - name: SPRING_DATASOURCE_URL
              value: jdbc:postgresql://postgres:5432/helpdesk
            - name: SPRING_DATASOURCE_USERNAME
              value: helpdesk
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: helpdesk-secrets
                  key: POSTGRES_PASSWORD
            - name: INTERNAL_API_KEY
              valueFrom:
                secretKeyRef:
                  name: helpdesk-secrets
                  key: INTERNAL_API_KEY
          ports:
            - containerPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-user-service
  namespace: helpdesk
spec:
  replicas: 1
  selector:
    matchLabels: { app: auth-user-service }
  template:
    metadata:
      labels: { app: auth-user-service }
    spec:
      containers:
        - name: auth-user-service
          image: your-registry/auth-user-service:latest
          env:
            - name: PORT
              value: "3001"
            - name: DATA_SERVICE_URL
              value: http://data-service:8080
            - name: REDIS_URL
              value: redis://default:$(REDIS_PASSWORD)@redis:6379
            - name: INTERNAL_API_KEY
              valueFrom:
                secretKeyRef:
                  name: helpdesk-secrets
                  key: INTERNAL_API_KEY
            - name: SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: helpdesk-secrets
                  key: SESSION_SECRET
            - name: SAML_CERT
              valueFrom:
                secretKeyRef:
                  name: helpdesk-secrets
                  key: SAML_CERT
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: helpdesk-secrets
                  key: REDIS_PASSWORD
          ports:
            - containerPort: 3001
---
