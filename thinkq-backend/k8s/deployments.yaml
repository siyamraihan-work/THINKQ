apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
  namespace: helpdesk
spec:
  replicas: 1
  selector:
    matchLabels: { app: nginx }
  template:
    metadata:
      labels: { app: nginx }
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d
          ports:
            - containerPort: 80
      volumes:
        - name: nginx-config
          configMap:
            name: nginx-config
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: analytics-service
  namespace: helpdesk
spec:
  replicas: 1
  selector:
    matchLabels: { app: analytics-service }
  template:
    metadata:
      labels: { app: analytics-service }
    spec:
      containers:
        - name: analytics-service
          image: your-registry/analytics-service:latest
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: helpdesk-secrets
                  key: REDIS_PASSWORD
            - name: REDIS_URL
              value: redis://default:$(REDIS_PASSWORD)@redis:6379
            - name: TICKETS_SERVICE_URL
              value: http://tickets-service:3003
            - name: INTERNAL_API_KEY
              valueFrom:
                secretKeyRef:
                  name: helpdesk-secrets
                  key: INTERNAL_API_KEY
            - name: EXPORT_DIR
              value: /app/exports
          volumeMounts:
            - name: analytics-exports
              mountPath: /app/exports
          ports:
            - containerPort: 3005
      volumes:
        - name: analytics-exports
          emptyDir: {}
