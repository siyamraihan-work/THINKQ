apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: helpdesk
data:
  default.conf: |
    server {
      listen 80;
      server_name _;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;

      location /auth/ { proxy_pass http://auth-user-service:3001; }
      location /users/ { proxy_pass http://auth-user-service:3001; }
      location /admin/ { proxy_pass http://admin-service:3002; }
      location /tickets/ { proxy_pass http://tickets-service:3003; }
      location /queue/ {
        proxy_pass http://notifications-service:3004;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        chunked_transfer_encoding off;
        proxy_buffering off;
      }
      location /events/ {
        proxy_pass http://notifications-service:3004;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        chunked_transfer_encoding off;
        proxy_buffering off;
      }
    }
